<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Ponto Local</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-gray-100 p-6">

    <div class="max-w-4xl mx-auto bg-white p-8 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">📊 Registro de Ponto & Horas Extras</h1>
        
        <form id="ponto-form" class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700">Data</label>
                <input type="date" id="data" required class="w-full mt-1 p-2 border rounded shadow-sm">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700">Entrada</label>
                <input type="time" id="entrada" required class="w-full mt-1 p-2 border rounded shadow-sm">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700">Sai. Almoço</label>
                <input type="time" id="saida_almoco" required class="w-full mt-1 p-2 border rounded shadow-sm">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700">Ret. Almoço</label>
                <input type="time" id="retorno_almoco" required class="w-full mt-1 p-2 border rounded shadow-sm">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700">Saída</label>
                <input type="time" id="saida" required class="w-full mt-1 p-2 border rounded shadow-sm">
            </div>
            <div class="md:col-span-5 text-right">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded shadow">
                    Gravar Dia
                </button>
            </div>
        </form>

        <hr class="my-6">

        <div id="relatorio-area">
            <h2 class="text-xl font-bold text-gray-700 mb-4">Histórico de Lançamentos</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left text-gray-500">
                    <thead class="text-xs text-gray-700 uppercase bg-gray-50">
                        <tr>
                            <th class="py-3 px-4">Data</th>
                            <th class="py-3 px-4">Dia</th>
                            <th class="py-3 px-4">Trabalhado</th>
                            <th class="py-3 px-4">H.E. (50%)</th>
                            <th class="py-3 px-4">H.E. (100%)</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-corpo">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="mt-6 text-left">
            <button onclick="exportarPDF()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded shadow">
                📄 Exportar Relatório PDF
            </button>
        </div>
    </div>

    <script>
        const form = document.getElementById('ponto-form');
        const tabelaCorpo = document.getElementById('tabela-corpo');

        // Carregar dados ao iniciar
        document.addEventListener('DOMContentLoaded', atualizarTabela);

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const dataVal = document.getElementById('data').value;
            const entrada = document.getElementById('entrada').value;
            const saidaAlmoco = document.getElementById('saida_almoco').value;
            const retornoAlmoco = document.getElementById('retorno_almoco').value;
            const saida = document.getElementById('saida').value;

            // Converter tudo para minutos desde as 00:00
            const minEntrada = toMinutes(entrada);
            const minSaidaAlmoco = toMinutes(saidaAlmoco);
            const minRetornoAlmoco = toMinutes(retornoAlmoco);
            const minSaida = toMinutes(saida);

            // Cálculos
            const turno1 = minSaidaAlmoco - minEntrada;
            const turno2 = minSaida - minRetornoAlmoco;
            const totalTrabalhado = turno1 + turno2;

            // Identificar dia da semana
            const dataObj = new Date(dataVal + 'T00:00:00');
            const diaSemana = dataObj.getDay(); // 0 = Domingo, 6 = Sábado
            const diasNome = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];

            let he50 = 0;
            let he100 = 0;
            const jornadaPadrao = 480; // 8 horas em minutos

            if (diaSemana === 0) { // Domingo
                he100 = totalTrabalhado; 
            } else if (diaSemana === 6) { // Sábado (Considerando tudo extra 100% ou ajuste conforme sua empresa)
                he100 = totalTrabalhado; 
            } else { // Dias de semana
                if (totalTrabalhado > jornadaPadrao) {
                    he50 = totalTrabalhado - jornadaPadrao;
                }
            }

            const registro = {
                data: dataVal,
                diaNome: diasNome[diaSemana],
                trabalhado: toHHMM(totalTrabalhado),
                he50: toHHMM(he50),
                he100: toHHMM(he100)
            };

            // Salvar no LocalStorage
            let historico = JSON.parse(localStorage.getItem('pontos')) || [];
            historico.push(registro);
            localStorage.setItem('pontos', JSON.stringify(historico));

            form.reset();
            atualizarTabela();
        });

        function toMinutes(timeStr) {
            const [h, m] = timeStr.split(':').map(Number);
            return (h * 60) + m;
        }

        function toHHMM(minutes) {
            if (minutes <= 0) return '00:00';
            const h = Math.floor(minutes / 60).toString().padStart(2, '0');
            const m = (minutes % 60).toString().padStart(2, '0');
            return `${h}:${m}`;
        }

        function atualizarTabela() {
            tabelaCorpo.innerHTML = '';
            const historico = JSON.parse(localStorage.getItem('pontos')) || [];
            
            // Ordenar por data
            historico.sort((a,b) => new Date(a.data) - new Date(b.data));

            historico.forEach(reg => {
                const row = `
                    <tr class="bg-white border-b hover:bg-gray-50">
                        <td class="py-3 px-4 font-medium text-gray-900">${reg.data.split('-').reverse().join('/')}</td>
                        <td class="py-3 px-4">${reg.diaNome}</td>
                        <td class="py-3 px-4">${reg.trabalhado}</td>
                        <td class="py-3 px-4 text-orange-600">${reg.he50}</td>
                        <td class="py-3 px-4 text-red-600">${reg.he100}</td>
                    </tr>
                `;
                tabelaCorpo.innerHTML += row;
            });
        }

        function exportarPDF() {
            const element = document.getElementById('relatorio-area');
            const opt = {
                margin:       10,
                filename:     'relatorio-horas-trabalhadas.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
